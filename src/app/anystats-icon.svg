<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 270">

  <!-- ═══ BEER GLASS ═══ -->
  <!-- Glass body (trapezoid) -->
  <path d="M 58,68 L 140,68 L 132,204 L 66,204 Z"
        fill="none" stroke="#1D3557" stroke-width="5.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glass base / foot -->
  <rect x="54" y="204" width="90" height="12" rx="2.5"
        fill="none" stroke="#1D3557" stroke-width="5.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Liquid level wave -->
  <path d="M 70,115 Q 83,106 96,115 Q 109,124 122,115 Q 128,111 131,112"
        fill="none" stroke="#1D3557" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Interior highlight line -->
  <line x1="78" y1="140" x2="74" y2="197"
        stroke="#1D3557" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bubbles above glass -->
  <circle cx="92" cy="53" r="8.5" fill="#1D3557"/>
  <circle cx="109" cy="43" r="5" fill="#1D3557"/>
  <!-- Bubbles inside upper glass -->
  <circle cx="86" cy="85" r="3.5" fill="#1D3557"/>
  <circle cx="104" cy="76" r="2.5" fill="#1D3557"/>

  <!-- ═══ STOPWATCH ═══ -->
  <!-- Main circle body -->
  <circle cx="192" cy="150" r="64"
          fill="none" stroke="#1D3557" stroke-width="5.5"/>
  <!-- Crown / push button at 12 o'clock
       Circle top = y=150-64=86 → crown sits y=72‥86 -->
  <rect x="184" y="72" width="16" height="14" rx="4" fill="#1D3557"/>
  <!-- Side lug at ~40° (upper right of circle) -->
  <rect x="234" y="98" width="15" height="11" rx="3" fill="#1D3557"/>
  <!-- Clock hand pointing to ~1:30 (45° from 12) -->
  <!-- endpoint: cx+55·sin45=192+38.9=231, cy-55·cos45=150-38.9=111 -->
  <line x1="192" y1="150" x2="230" y2="111"
        stroke="#1D3557" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Centre pivot dot -->
  <circle cx="192" cy="150" r="6.5" fill="#1D3557"/>

</svg>
