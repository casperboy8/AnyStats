name: Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart App
        run: |
          # Zorg dat de github-gebruiker toegang heeft tot de Node.js omgeving van de server
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Als nvm niet wordt gebruikt, proberen we ook het standaard wegeffect voor globale npm/pm2 installaties
          export PATH=$PATH:/usr/bin:/usr/local/bin:$HOME/.npm-global/bin
          
          cd /var/www/anystats
          
          # Lokale wijzigingen resetten om git-conflicten te voorkomen
          git reset --hard HEAD
          
          # De nieuwste commits ophalen van GitHub
          git pull origin main
          
          # Node.js dependencies installeren en de applicatie bouwen
          npm install
          npm run build
          
          # De applicatie herstarten met PM2 zodat de wijzigingen live gaan
          pm2 restart anystats || pm2 start npm --name "anystats" -- start