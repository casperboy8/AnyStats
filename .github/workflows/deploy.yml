name: Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart App
        run: |
          # Zorg dat de basisomgeving bekend is voor npm en pm2
          export PATH=$PATH:/usr/bin:/usr/local/bin
          
          # 1. Kopieer de zojuist gedownloade code van de runner naar de werkmap
          # We gebruiken 'cp' in plaats van git pull om git-fouten te omzeilen
          cp -r /home/actions-runner/_work/AnyStats/AnyStats/. /var/www/anystats/
          
          # 2. Ga naar de webmap
          cd /var/www/anystats
          
          # 3. Installeer dependencies en bouw de Next.js applicatie
          npm install
          npm run build
          
          # 4. Herstart de app met PM2
          pm2 restart anystats || pm2 start npm --name "anystats" -- start