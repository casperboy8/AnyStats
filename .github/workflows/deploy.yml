name: Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart App
        run: |
          # Geef het volledige, uitgebreide Linux-systeempad mee aan de runner
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          
          cd /var/www/anystats
          
          # Lokale wijzigingen resetten om git-conflicten te voorkomen
          git reset --hard HEAD
          
          # De nieuwste commits ophalen van GitHub
          git pull origin main
          
          # Node.js dependencies installeren en de applicatie bouwen
          npm install
          npm run build
          
          # De applicatie herstarten met PM2
          pm2 restart anystats || pm2 start npm --name "anystats" -- start