name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Pull latest code
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          cd /var/www/anystats
          git fetch origin main
          git reset --hard origin/main

      - name: 📦 Install dependencies
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          cd /var/www/anystats
          npm install

      - name: 💾 Backup huidige build
        run: |
          cd /var/www/anystats
          if [ -d .next ]; then
            rm -rf .next.bak
            cp -r .next .next.bak
            echo "✓ Backup gemaakt van vorige build"
          else
            echo "ℹ Geen vorige build aanwezig"
          fi

      - name: 🔨 Build
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          cd /var/www/anystats
          npm run build

      - name: 🚀 Herstart server + health check
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          cd /var/www/anystats

          pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          sleep 5

          # Health check: verwacht een 2xx of 3xx response
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✓ App draait — HTTP $STATUS"
            rm -rf .next.bak
          else
            echo "✗ App reageert niet goed — HTTP $STATUS"
            exit 1
          fi

      - name: ⏪ Rollback bij fout
        if: failure()
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          cd /var/www/anystats

          if [ -d .next.bak ]; then
            echo "⚠ Fout gevonden — terugzetten naar vorige versie..."
            rm -rf .next
            mv .next.bak .next
            pm2 restart ecosystem.config.js --update-env || true
            sleep 3

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            echo "↩ Rollback klaar — HTTP $STATUS"
          else
            echo "✗ Geen backup beschikbaar (build was al kapot)"
          fi
