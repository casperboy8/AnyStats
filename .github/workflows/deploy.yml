name: Remote Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Build and Restart App
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
          
          cd /var/www/anystats
          git reset --hard HEAD
          git pull origin main
          
          npm install
          npm run build
          
          pm2 restart anystats || pm2 start npm --name "anystats" -- start