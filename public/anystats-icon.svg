<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="7" fill="#1D3557"/>

  <!-- Bierglas (wit) -->
  <path d="M 5.5 8 L 13.5 8 L 12 22 L 7 22 Z"
        fill="none" stroke="white" stroke-width="1.6"
        stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="5.5" y="22" width="8" height="2" rx="0.6" fill="white"/>
  <!-- Schuim bubbels -->
  <circle cx="8"  cy="6"   r="1.5" fill="white"/>
  <circle cx="11.5" cy="5" r="1"   fill="white"/>
  <!-- Wave lijn in glas -->
  <path d="M 7.5 14.5 Q 9 13 10.5 14.5 Q 12 16 13 15"
        fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Stopwatch (wit) -->
  <circle cx="22" cy="20" r="8.5"
          fill="none" stroke="white" stroke-width="1.6"/>
  <!-- Knopje bovenop -->
  <rect x="19.5" y="10.5" width="5" height="2.5" rx="1" fill="white"/>
  <!-- Zijknopje -->
  <rect x="28"   y="14"   width="2.5" height="2" rx="0.5" fill="white"/>
  <!-- Wijzer -->
  <line x1="22" y1="20" x2="26.5" y2="15.5"
        stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Middelpunt -->
  <circle cx="22" cy="20" r="1.8" fill="#3AACB8"/>
</svg>
