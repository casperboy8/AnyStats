name: Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/anystats
            
            # Voorkom conflicten door lokale ongetrackte wijzigingen weg te gooien
            git reset --hard HEAD
            
            # Haal de nieuwste wijzigingen binnen van de main branch
            git pull origin main
            
            # Installeer de dependencies en bouw de Next.js applicatie opnieuw
            npm install
            npm run build
            
            # Optioneel: Voeg hieronder de regel toe om je Node process manager te herstarten
            pm2 restart anystats || pm2 start npm --name "anystats" -- start